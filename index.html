<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>作品さがし（試作版）</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="ageGate" class="age-gate">
    <div class="age-card">
      <p class="eyebrow">年齢確認</p>
      <h1>18歳以上ですか？</h1>
      <p>この試作版は成人向け作品を扱うサイトを想定しています。</p>
      <button id="enterBtn" class="primary">18歳以上です</button>
      <button id="leaveBtn" class="secondary">退出する</button>
    </div>
  </div>

  <header class="site-header">
    <div>
      <p class="eyebrow">FANZA作品発見サイト・MVP</p>
      <h1>好みから作品を見つける</h1>
    </div>
    <div style="display:flex;gap:10px;">
  <button id="favoritesBtn" class="icon-btn">
    ♡ お気に入り <span id="favoriteCount">0</span>
  </button>

  <button
    onclick="location.href='/dashboard.html'"
    class="icon-btn"
  >
    📊 分析
  </button>
</div>
  </header>

  <main>
    <section class="search-panel">
      <label for="keyword">キーワード</label>
      <div class="search-row">
        <input id="keyword" placeholder="出演者・メーカー・ジャンルなど">
        <button id="searchBtn" class="primary">検索</button>
      </div>

      <div class="filters">
        <select id="genreFilter">
          <option value="">すべてのジャンル</option>
          <option value="ドラマ">ドラマ</option>
          <option value="恋愛">恋愛</option>
          <option value="企画">企画</option>
        </select>
        <select id="makerFilter">
          <option value="">すべてのメーカー</option>
          <option value="Studio A">Studio A</option>
          <option value="Studio B">Studio B</option>
          <option value="Studio C">Studio C</option>
        </select>
        <select id="sortFilter">
          <option value="new">新着順</option>
          <option value="popular">人気順</option>
          <option value="priceLow">価格が安い順</option>
        </select>
      </div>
    </section>

    <section class="chips" aria-label="おすすめ条件">
      <button data-chip="新作">新作</button>
      <button data-chip="セール">セール</button>
      <button data-chip="高評価">高評価</button>
      <button data-chip="独占">独占</button>
    </section>

    <section class="result-header">
      <div>
        <p class="eyebrow">検索結果</p>
        <h2><span id="resultCount">0</span>件</h2>
      </div>
      <button id="resetBtn" class="secondary">条件をリセット</button>
    </section>

    <section id="results" class="cards"></section>
  </main>

  <template id="cardTemplate">
    <article class="card">
      <div class="thumb">
        <span class="badge"></span>
        <div class="placeholder">IMAGE</div>
      </div>
      <div class="card-body">
        <p class="meta"></p>
        <h3></h3>
        <p class="description"></p>
        <div class="tags"></div>
        <div class="card-footer">
          <div>
            <strong class="price"></strong>
            <span class="rating"></span>
          </div>
          <div class="actions">
            <button class="favorite secondary">♡</button>
            <a class="primary detail-link" href="#" target="_blank" rel="nofollow sponsored noopener">FANZAで見る</a>
          </div>
        </div>
      </div>
    </article>
  </template>

  <script src="app.js"></script>
</body>
</html>
