<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>投稿データ登録</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #f5f6f8;
      color: #171717;
    }

    .container {
      width: min(760px, 100%);
      margin: 0 auto;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1 {
      margin: 0;
      font-size: 28px;
    }

    .back-link {
      padding: 10px 14px;
      color: #171717;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid #d9dce2;
      border-radius: 10px;
    }

    .card {
      padding: 24px;
      background: #ffffff;
      border: 1px solid #e4e6eb;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.04);
    }

    .field {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 700;
    }

    input,
    textarea {
      width: 100%;
      padding: 12px 14px;
      font: inherit;
      border: 1px solid #cfd3da;
      border-radius: 10px;
    }

    textarea {
      min-height: 150px;
      resize: vertical;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .save-button {
      width: 100%;
      padding: 14px;
      font: inherit;
      font-weight: 700;
      color: #ffffff;
      background: #171717;
      border: 0;
      border-radius: 10px;
      cursor: pointer;
    }

    .save-button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .message {
      margin-top: 16px;
      padding: 13px;
      border-radius: 10px;
      display: none;
    }

    .message.success {
      display: block;
      color: #116329;
      background: #eaf7ee;
    }

    .message.error {
      display: block;
      color: #b42318;
      background: #fff0ee;
    }

    @media (max-width: 640px) {
      body {
        padding: 16px;
      }

      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="header">
      <h1>📝 投稿データ登録</h1>
      <a href="/dashboard.html" class="back-link">分析画面へ戻る</a>
    </header>

    <section class="card">
      <form id="postForm">
        <div class="field">
          <label for="postId">投稿ID</label>
          <input
            id="postId"
            name="post_id"
            type="text"
            placeholder="例：1234567890123456789"
            required
          />
        </div>

        <div class="field">
          <label for="content">投稿文</label>
          <textarea
            id="content"
            name="content"
            placeholder="Xに投稿した文章を入力"
          ></textarea>
        </div>

        <div class="field">
          <label for="postedAt">投稿日時</label>
          <input
            id="postedAt"
            name="posted_at"
            type="datetime-local"
          />
        </div>

        <div class="grid">
          <div class="field">
            <label for="impressions">インプレッション</label>
            <input id="impressions" name="impressions" type="number" min="0" value="0" />
          </div>

          <div class="field">
            <label for="likes">いいね</label>
            <input id="likes" name="likes" type="number" min="0" value="0" />
          </div>

          <div class="field">
            <label for="reposts">RP</label>
            <input id="reposts" name="reposts" type="number" min="0" value="0" />
          </div>

          <div class="field">
            <label for="bookmarks">ブックマーク</label>
            <input id="bookmarks" name="bookmarks" type="number" min="0" value="0" />
          </div>

          <div class="field">
            <label for="replies">返信</label>
            <input id="replies" name="replies" type="number" min="0" value="0" />
          </div>

          <div class="field">
            <label for="profileClicks">プロフィールクリック</label>
            <input
              id="profileClicks"
              name="profile_clicks"
              type="number"
              min="0"
              value="0"
            />
          </div>

          <div class="field">
            <label for="linkClicks">リンククリック</label>
            <input
              id="linkClicks"
              name="link_clicks"
              type="number"
              min="0"
              value="0"
            />
          </div>
        </div>

        <button id="saveButton" class="save-button" type="submit">
          保存する
        </button>

        <div id="message" class="message"></div>
      </form>
    </section>
  </main>

  <script>
    const form = document.getElementById("postForm");
    const saveButton = document.getElementById("saveButton");
    const message = document.getElementById("message");

    function toNumber(value) {
      const number = Number(value);
      return Number.isFinite(number) ? number : 0;
    }

    form.addEventListener("submit", async (event) => {
      event.preventDefault();

      saveButton.disabled = true;
      saveButton.textContent = "保存中...";
      message.className = "message";
      message.textContent = "";

      const formData = new FormData(form);
      const postedAt = formData.get("posted_at");

      const payload = {
        post_id: String(formData.get("post_id") || "").trim(),
        content: String(formData.get("content") || "").trim(),
        impressions: toNumber(formData.get("impressions")),
        likes: toNumber(formData.get("likes")),
        reposts: toNumber(formData.get("reposts")),
        bookmarks: toNumber(formData.get("bookmarks")),
        replies: toNumber(formData.get("replies")),
        profile_clicks: toNumber(formData.get("profile_clicks")),
        link_clicks: toNumber(formData.get("link_clicks")),
        posted_at: postedAt ? new Date(postedAt).toISOString() : new Date().toISOString()
      };

      try {
        const response = await fetch("/api/post", {
          method: "POST",
          headers: {
            "Content-Type": "application/json"
          },
          body: JSON.stringify(payload)
        });

        const result = await response.json();

        if (!response.ok) {
          throw new Error(result.error || "保存に失敗しました");
        }

        message.className = "message success";
        message.textContent = "投稿データを保存しました。";
        form.reset();

        document.getElementById("impressions").value = 0;
        document.getElementById("likes").value = 0;
        document.getElementById("reposts").value = 0;
        document.getElementById("bookmarks").value = 0;
        document.getElementById("replies").value = 0;
        document.getElementById("profileClicks").value = 0;
        document.getElementById("linkClicks").value = 0;
      } catch (error) {
        message.className = "message error";
        message.textContent = error.message;
      } finally {
        saveButton.disabled = false;
        saveButton.textContent = "保存する";
      }
    });
  </script>
</body>
</html>
