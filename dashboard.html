<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FANZA分析ダッシュボード</title>

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 24px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: #171717;
      background: #f5f6f8;
    }

    .container {
      width: min(1180px, 100%);
      margin: 0 auto;
    }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 24px;
    }

    h1,
    h2 {
      margin: 0;
    }

    h1 {
      font-size: 30px;
    }

    h2 {
      margin-bottom: 18px;
      font-size: 21px;
    }

    .back-button {
      padding: 10px 16px;
      color: #171717;
      text-decoration: none;
      background: #ffffff;
      border: 1px solid #d9dce2;
      border-radius: 10px;
    }

    .summary-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 16px;
      margin-bottom: 20px;
    }

    .two-column {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 20px;
      margin-bottom: 20px;
    }

    .card {
      padding: 22px;
      background: #ffffff;
      border: 1px solid #e4e6eb;
      border-radius: 16px;
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.04);
    }

    .summary-label {
      margin-bottom: 10px;
      color: #656b76;
      font-size: 14px;
    }

    .summary-number {
      font-size: 38px;
      font-weight: 750;
      line-height: 1;
    }

    .ranking-list {
      display: grid;
      gap: 10px;
    }

    .ranking-item {
      display: grid;
      grid-template-columns: 34px minmax(0, 1fr) auto;
      align-items: center;
      gap: 10px;
      padding: 12px 0;
      border-bottom: 1px solid #eceef2;
    }

    .ranking-item:last-child {
      border-bottom: 0;
    }

    .rank {
      font-weight: 700;
    }

    .ranking-name {
      overflow-wrap: anywhere;
    }

    .ranking-count {
      font-weight: 700;
      white-space: nowrap;
    }

    .product-table {
      width: 100%;
      border-collapse: collapse;
    }

    .product-table th,
    .product-table td {
      padding: 13px 10px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid #eceef2;
    }

    .product-table th {
      color: #656b76;
      font-size: 13px;
    }

    .product-title {
      min-width: 280px;
      overflow-wrap: anywhere;
    }

    .recent-list {
      display: grid;
      gap: 12px;
    }

    .recent-item {
      padding: 14px;
      background: #f8f9fb;
      border-radius: 12px;
    }

    .recent-title {
      margin-bottom: 7px;
      font-weight: 700;
      overflow-wrap: anywhere;
    }

    .recent-meta {
      color: #656b76;
      font-size: 13px;
      line-height: 1.6;
    }

    .daily-list {
      display: grid;
      gap: 12px;
    }

    .daily-row {
      display: grid;
      grid-template-columns: 110px minmax(0, 1fr) 50px;
      align-items: center;
      gap: 12px;
    }

    .bar-area {
      height: 12px;
      overflow: hidden;
      background: #e8eaf0;
      border-radius: 999px;
    }

    .bar {
      height: 100%;
      background: #171717;
      border-radius: 999px;
    }

    .empty,
    .error {
      padding: 18px;
      color: #656b76;
      text-align: center;
    }

    .error {
      color: #b42318;
      background: #fff0ee;
      border-radius: 12px;
    }

    @media (max-width: 800px) {
      body {
        padding: 16px;
      }

      .header {
        align-items: flex-start;
        flex-direction: column;
      }

      .summary-grid,
      .two-column {
        grid-template-columns: 1fr;
      }

      .product-table {
        font-size: 13px;
      }

      .product-title {
        min-width: 190px;
      }

      .table-wrap {
        overflow-x: auto;
      }
    }
  </style>
</head>

<body>
  <main class="container">
    <header class="header">
      <h1>📊 FANZA分析ダッシュボード</h1>
      <a href="/" class="back-button">作品検索へ戻る</a>
    </header>

    <div id="errorBox"></div>

    <section class="summary-grid">
      <div class="card">
        <div class="summary-label">総クリック数</div>
        <div id="all" class="summary-number">0</div>
      </div>

      <div class="card">
        <div class="summary-label">今日</div>
        <div id="today" class="summary-number">0</div>
      </div>

      <div class="card">
        <div class="summary-label">過去7日</div>
        <div id="week" class="summary-number">0</div>
      </div>

      <div class="card">
        <div class="summary-label">過去30日</div>
        <div id="month" class="summary-number">0</div>
      </div>
    </section>

    <section class="card" style="margin-bottom: 20px;">
      <h2>人気作品</h2>

      <div class="table-wrap">
        <table class="product-table">
          <thead>
            <tr>
              <th>順位</th>
              <th>作品</th>
              <th>女優</th>
              <th>メーカー</th>
              <th>クリック</th>
            </tr>
          </thead>

          <tbody id="productRanking"></tbody>
        </table>
      </div>
    </section>

    <section class="two-column">
      <div class="card">
        <h2>人気メーカー</h2>
        <div id="makerRanking" class="ranking-list"></div>
      </div>

      <div class="card">
        <h2>人気ジャンル</h2>
        <div id="genreRanking" class="ranking-list"></div>
      </div>
    </section>

    <section class="two-column">
      <div class="card">
        <h2>日別クリック数</h2>
        <div id="dailyClicks" class="daily-list"></div>
      </div>

      <div class="card">
        <h2>最近クリックされた作品</h2>
        <div id="recentClicks" class="recent-list"></div>
      </div>
    </section>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function renderSimpleRanking(elementId, items) {
      const element = document.getElementById(elementId);

      if (!items.length) {
        element.innerHTML = '<div class="empty">まだデータがありません</div>';
        return;
      }

      element.innerHTML = items
        .map(
          (item, index) => `
            <div class="ranking-item">
              <div class="rank">${index + 1}</div>
              <div class="ranking-name">${escapeHtml(item.name)}</div>
              <div class="ranking-count">${item.clicks}回</div>
            </div>
          `
        )
        .join("");
    }

    function renderProducts(products) {
      const element = document.getElementById("productRanking");

      if (!products.length) {
        element.innerHTML = `
          <tr>
            <td colspan="5" class="empty">まだデータがありません</td>
          </tr>
        `;
        return;
      }

      element.innerHTML = products
        .map(
          (product, index) => `
            <tr>
              <td>${index + 1}</td>
              <td class="product-title">${escapeHtml(product.title)}</td>
              <td>${escapeHtml(product.actress || "―")}</td>
              <td>${escapeHtml(product.maker || "―")}</td>
              <td><strong>${product.clicks}回</strong></td>
            </tr>
          `
        )
        .join("");
    }

    function renderDailyClicks(items) {
      const element = document.getElementById("dailyClicks");

      if (!items.length) {
        element.innerHTML = '<div class="empty">まだデータがありません</div>';
        return;
      }

      const sortedItems = [...items].reverse();
      const maximum = Math.max(...sortedItems.map((item) => item.clicks), 1);

      element.innerHTML = sortedItems
        .map((item) => {
          const width = Math.max((item.clicks / maximum) * 100, 4);

          return `
            <div class="daily-row">
              <div>${escapeHtml(item.date)}</div>
              <div class="bar-area">
                <div class="bar" style="width:${width}%"></div>
              </div>
              <div><strong>${item.clicks}</strong></div>
            </div>
          `;
        })
        .join("");
    }

    function renderRecentClicks(items) {
      const element = document.getElementById("recentClicks");

      if (!items.length) {
        element.innerHTML = '<div class="empty">まだデータがありません</div>';
        return;
      }

      element.innerHTML = items
        .map((item) => {
          const clickedAt = item.clicked_at
            ? new Date(item.clicked_at).toLocaleString("ja-JP")
            : "日時不明";

          return `
            <div class="recent-item">
              <div class="recent-title">
                ${escapeHtml(item.title || "タイトル不明")}
              </div>

              <div class="recent-meta">
                ${escapeHtml(clickedAt)}<br>
                女優：${escapeHtml(item.actress || "―")}<br>
                メーカー：${escapeHtml(item.maker || "―")}
              </div>
            </div>
          `;
        })
        .join("");
    }

    async function loadDashboard() {
      try {
        const response = await fetch("/api/stats", {
          cache: "no-store"
        });

        const data = await response.json();

        if (!response.ok) {
          throw new Error(data.error || "分析データの取得に失敗しました");
        }

        document.getElementById("all").textContent =
          data.totals?.all ?? 0;

        document.getElementById("today").textContent =
          data.totals?.today ?? 0;

        document.getElementById("week").textContent =
          data.totals?.sevenDays ?? 0;

        document.getElementById("month").textContent =
          data.totals?.thirtyDays ?? 0;

        renderProducts(data.topProducts || []);
        renderSimpleRanking("makerRanking", data.topMakers || []);
        renderSimpleRanking("genreRanking", data.topGenres || []);
        renderDailyClicks(data.dailyClicks || []);
        renderRecentClicks(data.recentClicks || []);
      } catch (error) {
        document.getElementById("errorBox").innerHTML = `
          <div class="error">
            ${escapeHtml(error.message)}
          </div>
        `;
      }
    }

    loadDashboard();
  </script>
</body>
</html>
